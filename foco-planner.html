<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>FOCO — Planner</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
    body { background: #f0ebe1; overscroll-behavior: none; }
    input, textarea, select { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.storage = {
      get: async (k) => {
        const v = localStorage.getItem(k);
        return v ? { value: v } : null;
      },
      set: async (k, v) => localStorage.setItem(k, v),
    };
  </script>

  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const ACCENT = "#c9a84c";
const PROJECT_COLORS = ["#c9a84c", "#6eb5a0", "#c47070", "#8b7fc7"];
const STATUSES = ["todo", "doing", "done"];
const STATUS_LABELS = { todo: "Pendiente", doing: "En curso", done: "Listo" };
const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
const DAYS_SHORT = ["LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB", "DOM"];

const DEFAULT_PROJECTS = [
  { id: "p1", name: "Pintura", color: "#c9a84c" },
  { id: "p2", name: "Música", color: "#6eb5a0" },
  { id: "p3", name: "Casa", color: "#c47070" },
  { id: "p4", name: "Amistades", color: "#8b7fc7" },
];

const genId = () => Math.random().toString(36).substr(2, 9);
const F = "'Helvetica Neue', Helvetica, Arial, sans-serif";

const BG = "#f0ebe1";
const TEXT = "#1c1814";
const TEXT_SUB = "#7d7166";
const TEXT_MUTED = "#b5a99c";
const CARD = "rgba(255,255,255,0.82)";
const DARK = "#1c1814";

function getTodayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function getCurrentWeekDates() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

const ymd = (ts) => {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

const formatTime = (ts) => {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};

const formatDateLabel = (ymdStr) => {
  const today = ymd(Date.now());
  const yest = ymd(Date.now() - 86400000);
  if (ymdStr === today) return "Hoy";
  if (ymdStr === yest) return "Ayer";
  const [y,m,d] = ymdStr.split("-").map(Number);
  const date = new Date(y, m-1, d);
  return date.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
};

const CSS = `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}
button{cursor:pointer;border:none;background:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:inherit;color:inherit;padding:0}
input,textarea,select{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#1c1814}
select option{background:#f5f0e8}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
`;

const lbl = (txt) => (
  <p style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.12em", color: TEXT_MUTED, fontFamily: F, marginBottom: 7, textTransform: "uppercase" }}>{txt}</p>
);

function ProgressRing({ progress, size = 48, stroke = 2, color = ACCENT }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (Math.min(progress, 100) / 100) * circ;
  const c = size / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="rgba(0,0,0,0.08)" strokeWidth={stroke} />
      <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${c} ${c})`}
        style={{ transition: "stroke-dasharray 0.5s ease" }} />
      <text x={c} y={c + 4} textAnchor="middle" fill={TEXT_SUB}
        fontSize={10} fontFamily={F} fontWeight="600">
        {Math.round(progress)}%
      </text>
    </svg>
  );
}

function TaskCard({ task, project, isExpanded, isFocused, onToggleExpand, onToggleFocus, onAdvance, onRegress, onToggleDone, onEdit, compact = false }) {
  const isDone = task.status === "done";
  const color = project?.color || ACCENT;
  const [hov, setHov] = useState(false);
  const isAppointment = project?.name === "Amistades";
  return (
    <div
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? "rgba(255,255,255,0.97)" : CARD,
        border: `1px solid rgba(255,255,255,${hov ? "1" : "0.88"})`,
        borderRadius: 16,
        padding: compact ? "10px 13px" : "13px 16px",
        marginBottom: 8,
        opacity: isDone ? 0.45 : 1,
        transition: "all 0.2s",
        backdropFilter: "blur(14px)",
        boxShadow: hov ? "0 6px 24px rgba(0,0,0,0.09)" : "0 2px 8px rgba(0,0,0,0.04)",
      }}
    >
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
        {!isAppointment && (
          <button
            onClick={onToggleDone}
            title={isDone ? "Marcar pendiente" : "Marcar completada"}
            style={{
              width: 18, height: 18, borderRadius: 6, marginTop: 1, flexShrink: 0,
              border: `1.5px solid ${isDone ? color : TEXT_MUTED}`,
              background: isDone ? color : "transparent",
              color: "#fff", fontSize: 11, lineHeight: 1,
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.15s", cursor: "pointer",
            }}
          >
            {isDone ? "✓" : ""}
          </button>
        )}
        <button
          onClick={onToggleFocus}
          title={isFocused ? "Quitar del foco" : "Añadir al foco"}
          style={{ color: isFocused ? ACCENT : TEXT_MUTED, fontSize: 14, lineHeight: 1, marginTop: 1, flexShrink: 0, transition: "color 0.15s" }}
        >
          {isFocused ? "★" : "☆"}
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <p
            onClick={task.notes ? onToggleExpand : undefined}
            style={{ fontSize: compact ? 12 : 13, fontWeight: 400, lineHeight: 1.4, textDecoration: isDone ? "line-through" : "none", color: isDone ? TEXT_MUTED : TEXT, cursor: task.notes ? "pointer" : "default", wordBreak: "break-word", userSelect: "none", fontFamily: F }}
          >
            {task.title}
            {task.notes && <span style={{ color: TEXT_MUTED, marginLeft: 4, fontSize: 9 }}>{isExpanded ? "▲" : "▼"}</span>}
          </p>
          {isExpanded && task.notes && (
            <p style={{ color: TEXT_SUB, fontSize: 12, marginTop: 8, lineHeight: 1.6, paddingLeft: 10, borderLeft: `2px solid ${color}40`, fontFamily: F, fontWeight: 300 }}>
              {task.notes}
            </p>
          )}
          {!compact && project && (
            <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 5 }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: color }} />
              <span style={{ fontSize: 10, color: TEXT_MUTED, fontFamily: F, fontWeight: 400, letterSpacing: "0.04em" }}>{project.name}</span>
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 1, flexShrink: 0, alignItems: "center" }}>
          {task.status !== "todo" && (
            <button onClick={onRegress} title="Atrás" style={{ color: TEXT_MUTED, fontSize: 16, padding: "2px 4px", lineHeight: 1 }}>‹</button>
          )}
          {task.status !== "done" && (
            <button onClick={onAdvance} title="Avanzar" style={{ color: task.status === "doing" ? color : TEXT_MUTED, fontSize: 16, padding: "2px 4px", lineHeight: 1 }}>›</button>
          )}
          <button onClick={onEdit} title="Editar" style={{ color: TEXT_MUTED, fontSize: 11, padding: "2px 6px", lineHeight: 1 }}>✎</button>
        </div>
      </div>
    </div>
  );
}

function Modal({ modal, projects, onAddTask, onUpdateTask, onDeleteTask, onAddProject, onUpdateProject, onDeleteProject, onClose }) {
  const isTask = modal.mode === "addTask" || modal.mode === "editTask";
  const [title, setTitle] = useState(modal.task?.title || "");
  const [notes, setNotes] = useState(modal.task?.notes || "");
  const [status, setStatus] = useState(modal.task?.status || modal.defaultStatus || "todo");
  const [projectId, setProjectId] = useState(modal.task?.projectId || modal.projectId || projects[0]?.id || "");
  const [weekDay, setWeekDay] = useState(modal.task?.weekDay ?? modal.defaultWeekDay ?? -1);
  const [projName, setProjName] = useState(modal.project?.name || "");
  const [projColor, setProjColor] = useState(modal.project?.color || PROJECT_COLORS[0]);
  const [confirm, setConfirm] = useState(false);

  const iS = {
    width: "100%",
    background: "#f5f0e8",
    border: "1px solid rgba(0,0,0,0.07)",
    borderRadius: 12,
    padding: "10px 14px",
    color: TEXT,
    outline: "none",
    fontSize: 16,
    fontFamily: F,
    fontWeight: 400,
  };

  const TITLES = { addTask: "NUEVA TAREA", editTask: "EDITAR TAREA", addProject: "NUEVO PROYECTO", editProject: "EDITAR PROYECTO" };

  const handleSubmit = () => {
    const wd = parseInt(weekDay);
    const wdVal = wd >= 0 ? wd : null;
    if (modal.mode === "addTask" && title.trim()) onAddTask(title.trim(), notes.trim(), status, projectId, wdVal);
    else if (modal.mode === "editTask" && title.trim()) { onUpdateTask(modal.task.id, { title: title.trim(), notes: notes.trim(), status, projectId, weekDay: wdVal }); onClose(); }
    else if (modal.mode === "addProject" && projName.trim()) onAddProject(projName.trim(), projColor);
    else if (modal.mode === "editProject" && projName.trim()) onUpdateProject(modal.project.id, { name: projName.trim(), color: projColor });
  };

  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(28,24,20,0.38)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20, animation: "fadeIn 0.15s ease", backdropFilter: "blur(10px)" }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{ background: "rgba(255,255,255,0.96)", border: "1px solid rgba(255,255,255,1)", borderRadius: 24, padding: 32, width: "100%", maxWidth: 460, animation: "slideUp 0.2s ease", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 64px rgba(0,0,0,0.14)" }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", color: TEXT, fontFamily: F }}>{TITLES[modal.mode]}</p>
          <button onClick={onClose} style={{ color: TEXT_MUTED, fontSize: 18, lineHeight: 1, width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "50%", background: "rgba(0,0,0,0.05)" }}>×</button>
        </div>

        {isTask && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>{lbl("Tarea")}<input value={title} onChange={e => setTitle(e.target.value)} placeholder="¿Qué hay que hacer?" style={iS} autoFocus onKeyDown={e => e.key === "Enter" && handleSubmit()} /></div>
            <div>{lbl("Notas")}<textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Ideas, contexto, referencias..." style={{ ...iS, minHeight: 76, resize: "vertical" }} /></div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div>{lbl("Estado")}<select value={status} onChange={e => setStatus(e.target.value)} style={iS}>{STATUSES.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}</select></div>
              <div>{lbl("Día")}<select value={weekDay} onChange={e => setWeekDay(e.target.value)} style={iS}><option value={-1}>Sin planificar</option>{DAYS.map((d, i) => <option key={i} value={i}>{d}</option>)}</select></div>
            </div>
            {projects.length > 1 && (
              <div>{lbl("Proyecto")}<select value={projectId} onChange={e => setProjectId(e.target.value)} style={iS}>{projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
            )}
            <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
              {modal.mode === "editTask" && (
                <button
                  onClick={() => confirm ? onDeleteTask(modal.task.id) : setConfirm(true)}
                  style={{ padding: "10px 18px", border: `1px solid ${confirm ? "#c47070" : "rgba(0,0,0,0.1)"}`, borderRadius: 50, color: confirm ? "#c47070" : TEXT_SUB, fontSize: 12, fontFamily: F, transition: "all 0.2s", background: "transparent" }}
                >
                  {confirm ? "¿Confirmar?" : "Eliminar"}
                </button>
              )}
              <button
                onClick={handleSubmit}
                disabled={!title.trim()}
                style={{ flex: 1, background: title.trim() ? DARK : "rgba(0,0,0,0.08)", color: title.trim() ? "#fff" : TEXT_MUTED, fontWeight: 700, padding: "10px 24px", borderRadius: 50, fontSize: 11, letterSpacing: "0.1em", cursor: title.trim() ? "pointer" : "not-allowed", fontFamily: F, border: "none", textTransform: "uppercase", transition: "all 0.2s" }}
              >
                {modal.mode === "addTask" ? "Añadir" : "Guardar"}
              </button>
            </div>
          </div>
        )}

        {!isTask && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>{lbl("Nombre")}<input value={projName} onChange={e => setProjName(e.target.value)} placeholder="Nombre del proyecto" style={iS} autoFocus onKeyDown={e => e.key === "Enter" && handleSubmit()} /></div>
            <div>
              {lbl("Color")}
              <div style={{ display: "flex", gap: 10 }}>
                {PROJECT_COLORS.map(c => (
                  <button key={c} onClick={() => setProjColor(c)} style={{ width: 28, height: 28, borderRadius: "50%", background: c, border: projColor === c ? `3px solid ${TEXT}` : "3px solid transparent", transition: "border 0.15s", boxShadow: projColor === c ? "0 0 0 1px rgba(0,0,0,0.1)" : "none" }} />
                ))}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
              {modal.mode === "editProject" && (
                <button
                  onClick={() => confirm ? onDeleteProject(modal.project.id) : setConfirm(true)}
                  style={{ padding: "10px 18px", border: `1px solid ${confirm ? "#c47070" : "rgba(0,0,0,0.1)"}`, borderRadius: 50, color: confirm ? "#c47070" : TEXT_SUB, fontSize: 12, fontFamily: F, transition: "all 0.2s", background: "transparent" }}
                >
                  {confirm ? "¿Confirmar?" : "Eliminar"}
                </button>
              )}
              <button
                onClick={handleSubmit}
                disabled={!projName.trim()}
                style={{ flex: 1, background: projName.trim() ? DARK : "rgba(0,0,0,0.08)", color: projName.trim() ? "#fff" : TEXT_MUTED, fontWeight: 700, padding: "10px 24px", borderRadius: 50, fontSize: 11, letterSpacing: "0.1em", cursor: projName.trim() ? "pointer" : "not-allowed", fontFamily: F, border: "none", textTransform: "uppercase", transition: "all 0.2s" }}
              >
                {modal.mode === "addProject" ? "Crear" : "Guardar"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const EVENT_LABELS = {
  task_created: "creaste",
  task_done: "completaste",
  task_undone: "reabriste",
  task_deleted: "eliminaste",
  task_updated: "editaste",
  focus_on: "pusiste en foco",
  focus_off: "quitaste del foco",
  project_created: "creaste proyecto",
};

const EVENT_ICONS = {
  task_created: "+",
  task_done: "✓",
  task_undone: "↺",
  task_deleted: "×",
  task_updated: "✎",
  focus_on: "★",
  focus_off: "☆",
  project_created: "◆",
};

function HistoryView({ history, projects }) {
  if (!history.length) return (
    <div style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px dashed rgba(0,0,0,0.1)", borderRadius: 18, padding: "28px 20px", color: TEXT_MUTED, fontSize: 12, textAlign: "center", fontFamily: F }}>
      Sin actividad aún — crea o completa tareas para ver tu historial
    </div>
  );
  const grouped = {};
  history.forEach(ev => {
    const k = ymd(ev.ts);
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(ev);
  });
  const keys = Object.keys(grouped).sort().reverse();
  return (
    <div>
      {keys.map(k => (
        <section key={k} style={{ marginBottom: 28 }}>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.14em", color: TEXT, fontFamily: F, textTransform: "uppercase", marginBottom: 12 }}>
            {formatDateLabel(k)} <span style={{ color: TEXT_MUTED, fontWeight: 500, marginLeft: 8 }}>{grouped[k].length} eventos</span>
          </p>
          {grouped[k].map(ev => {
            const proj = projects.find(p => p.id === ev.projectId);
            const color = proj?.color || ACCENT;
            return (
              <div key={ev.id} style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px solid rgba(255,255,255,0.88)", borderRadius: 14, padding: "10px 14px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: color + "25", color: color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  {EVENT_ICONS[ev.type] || "•"}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 13, color: TEXT, fontFamily: F, fontWeight: 400, lineHeight: 1.3 }}>
                    <span style={{ color: TEXT_SUB }}>{EVENT_LABELS[ev.type] || ev.type}</span>{" "}
                    <span style={{ fontWeight: 500 }}>{ev.label}</span>
                  </p>
                  {proj && (
                    <p style={{ fontSize: 10, color: TEXT_MUTED, fontFamily: F, marginTop: 2, letterSpacing: "0.04em" }}>{proj.name}</p>
                  )}
                </div>
                <span style={{ fontSize: 10, color: TEXT_MUTED, fontFamily: F, fontWeight: 500, flexShrink: 0 }}>{formatTime(ev.ts)}</span>
              </div>
            );
          })}
        </section>
      ))}
    </div>
  );
}

function StatsView({ history, tasks, projects }) {
  const doneEvents = history.filter(h => h.type === "task_done");
  const totalDone = tasks.filter(t => t.status === "done").length;

  // Per-project activity (all events related to that project)
  const perProject = projects.map(p => {
    const events = history.filter(h => h.projectId === p.id).length;
    const done = tasks.filter(t => t.projectId === p.id && t.status === "done").length;
    const total = tasks.filter(t => t.projectId === p.id).length;
    return { ...p, events, done, total };
  });
  const maxEvents = Math.max(1, ...perProject.map(p => p.events));

  // Last 7 days "tasks done"
  const today = new Date(); today.setHours(0,0,0,0);
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() - (6 - i));
    const key = ymd(d.getTime());
    const count = doneEvents.filter(ev => ymd(ev.ts) === key).length;
    return { date: d, key, count, label: DAYS_SHORT[d.getDay() === 0 ? 6 : d.getDay() - 1] };
  });
  const max7 = Math.max(1, ...last7.map(d => d.count));

  // Streak
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = ymd(d.getTime());
    if (doneEvents.some(ev => ymd(ev.ts) === key)) streak++;
    else if (i > 0) break;
    else break;
  }

  const activeDays = new Set(doneEvents.map(ev => ymd(ev.ts))).size;
  const topProject = [...perProject].sort((a,b) => b.events - a.events)[0];

  const StatBox = ({ n, label, color }) => (
    <div style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px solid rgba(255,255,255,0.9)", borderRadius: 18, padding: "20px 18px", flex: 1, minWidth: 130, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
      <p style={{ fontSize: 42, fontWeight: 800, color: color || TEXT, fontFamily: F, letterSpacing: "-0.03em", lineHeight: 1 }}>{n}</p>
      <p style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.14em", color: TEXT_MUTED, fontFamily: F, textTransform: "uppercase", marginTop: 8 }}>{label}</p>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 28, flexWrap: "wrap" }}>
        <StatBox n={totalDone} label="Completadas" color={ACCENT} />
        <StatBox n={streak} label="Racha días" color="#c47070" />
        <StatBox n={activeDays} label="Días activos" color="#6eb5a0" />
      </div>

      <section style={{ marginBottom: 32 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", color: TEXT, fontFamily: F, textTransform: "uppercase", marginBottom: 14 }}>DÓNDE INVIERTES TU TIEMPO</p>
        <div style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px solid rgba(255,255,255,0.9)", borderRadius: 18, padding: "20px 20px", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
          {perProject.map(p => {
            const pct = maxEvents > 0 ? (p.events / maxEvents) * 100 : 0;
            return (
              <div key={p.id} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: TEXT, fontFamily: F, letterSpacing: "0.04em" }}>{p.name}</span>
                  <span style={{ fontSize: 10, color: TEXT_MUTED, fontFamily: F, fontWeight: 500 }}>

                  </span>
                </div>
                <div style={{ height: 8, background: "rgba(0,0,0,0.05)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: p.color, borderRadius: 4, transition: "width 0.5s" }} />
                </div>
              </div>
            );
          })}
        </div>
        {topProject && topProject.events > 0 && (
          <p style={{ fontSize: 11, color: TEXT_MUTED, fontFamily: F, marginTop: 10, fontStyle: "italic" }}>
            Más activo en: <span style={{ color: topProject.color, fontWeight: 600, fontStyle: "normal" }}>{topProject.name}</span>
          </p>
        )}
      </section>

      <section style={{ marginBottom: 32 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", color: TEXT, fontFamily: F, textTransform: "uppercase", marginBottom: 14 }}>ÚLTIMOS 7 DÍAS — COMPLETADAS</p>
        <div style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px solid rgba(255,255,255,0.9)", borderRadius: 18, padding: "24px 20px", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 8, height: 140 }}>
            {last7.map((d, i) => {
              const h = d.count === 0 ? 6 : Math.max(10, (d.count / max7) * 120);
              const isToday = i === last7.length - 1;
              return (
                <div key={d.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 11, color: d.count > 0 ? TEXT : TEXT_MUTED, fontFamily: F, fontWeight: 700 }}>{d.count || "—"}</span>
                  <div style={{ width: "100%", height: h, background: isToday ? ACCENT : d.count > 0 ? DARK : "rgba(0,0,0,0.08)", borderRadius: 8, transition: "height 0.4s" }} />
                  <span style={{ fontSize: 9, color: isToday ? ACCENT : TEXT_MUTED, fontFamily: F, fontWeight: 700, letterSpacing: "0.12em" }}>{d.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      </section>
    </div>
  );
}

function App() {
  const [projects, setProjects] = useState(DEFAULT_PROJECTS);
  const [tasks, setTasks] = useState([]);
  const [activeProject, setActiveProject] = useState("p1");
  const [focusIds, setFocusIds] = useState([]);
  const [history, setHistory] = useState([]);
  const [modal, setModal] = useState(null);
  const [expandedTask, setExpandedTask] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("hoy");

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("foco-planner-v3");
        if (r) {
          const d = JSON.parse(r.value);
          if (d.projects?.length) setProjects(d.projects);
          if (d.tasks) setTasks(d.tasks);
          if (d.focusIds) setFocusIds(d.focusIds);
          if (d.activeProject) setActiveProject(d.activeProject);
          if (d.history) setHistory(d.history);
        }
      } catch {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set("foco-planner-v3", JSON.stringify({ projects, tasks, focusIds, activeProject, history }));
      } catch {}
    })();
  }, [projects, tasks, focusIds, activeProject, history, loaded]);

  const log = (type, label, projectId) => {
    setHistory(prev => [{ id: genId(), ts: Date.now(), type, label, projectId }, ...prev].slice(0, 1000));
  };

  const addTask = (title, notes, status, projectId, weekDay) => {
    setTasks(prev => [...prev, { id: genId(), title, notes, status, projectId, weekDay: weekDay ?? null, createdAt: Date.now() }]);
    log("task_created", title, projectId);
    if (status === "done") log("task_done", title, projectId);
    setModal(null);
  };
  const updateTask = (id, u) => {
    const old = tasks.find(t => t.id === id);
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...u } : t));
    if (old) {
      const newStatus = u.status !== undefined ? u.status : old.status;
      const newTitle = u.title !== undefined ? u.title : old.title;
      const newProjectId = u.projectId !== undefined ? u.projectId : old.projectId;
      if (u.status !== undefined && u.status !== old.status) {
        if (u.status === "done") log("task_done", newTitle, newProjectId);
        else if (old.status === "done") log("task_undone", newTitle, newProjectId);
      } else {
        log("task_updated", newTitle, newProjectId);
      }
    }
  };
  const deleteTask = (id) => {
    const t = tasks.find(x => x.id === id);
    if (t) log("task_deleted", t.title, t.projectId);
    setTasks(p => p.filter(t => t.id !== id));
    setFocusIds(p => p.filter(f => f !== id));
    if (expandedTask === id) setExpandedTask(null);
    setModal(null);
  };
  const advanceStatus = (task) => { const i = STATUSES.indexOf(task.status); if (i < STATUSES.length - 1) updateTask(task.id, { status: STATUSES[i + 1] }); };
  const regressStatus = (task) => { const i = STATUSES.indexOf(task.status); if (i > 0) updateTask(task.id, { status: STATUSES[i - 1] }); };
  const toggleFocus = (id) => {
    const task = tasks.find(t => t.id === id);
    setFocusIds(prev => {
      const isNow = prev.includes(id);
      if (task) log(isNow ? "focus_off" : "focus_on", task.title, task.projectId);
      return isNow ? prev.filter(f => f !== id) : [...prev, id];
    });
  };
  const addProject = (name, color) => {
    const p = { id: genId(), name, color };
    setProjects(prev => [...prev, p]);
    setActiveProject(p.id);
    log("project_created", name, p.id);
    setModal(null);
  };
  const updateProject = (id, u) => { setProjects(p => p.map(x => x.id === id ? { ...x, ...u } : x)); setModal(null); };
  const deleteProject = (id) => {
    const rest = projects.filter(p => p.id !== id);
    if (!rest.length) return;
    const gone = tasks.filter(t => t.projectId === id).map(t => t.id);
    setProjects(rest); setTasks(p => p.filter(t => t.projectId !== id)); setFocusIds(p => p.filter(f => !gone.includes(f))); setActiveProject(rest[0]?.id || ""); setModal(null);
  };

  const projectTasks = tasks.filter(t => t.projectId === activeProject);
  const getProgress = (pid) => { const pts = tasks.filter(t => t.projectId === pid); return pts.length ? Math.round(pts.filter(t => t.status === "done").length / pts.length * 100) : 0; };
  const overall = tasks.length ? Math.round(tasks.filter(t => t.status === "done").length / tasks.length * 100) : 0;
  const todayRaw = new Date().toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
  const todayStr = todayRaw.charAt(0).toUpperCase() + todayRaw.slice(1);
  const activeProj = projects.find(p => p.id === activeProject);
  const todayIdx = getTodayIndex();
  const weekDates = getCurrentWeekDates();
  const focusTasks = focusIds.map(id => tasks.find(t => t.id === id)).filter(Boolean);
  const todayScheduled = tasks.filter(t => t.weekDay === todayIdx && !focusIds.includes(t.id));

  const cp = (task) => ({
    task, project: projects.find(p => p.id === task.projectId),
    isExpanded: expandedTask === task.id, isFocused: focusIds.includes(task.id),
    onToggleExpand: () => setExpandedTask(expandedTask === task.id ? null : task.id),
    onToggleFocus: () => toggleFocus(task.id),
    onAdvance: () => advanceStatus(task), onRegress: () => regressStatus(task),
    onToggleDone: () => updateTask(task.id, { status: task.status === "done" ? "todo" : "done" }),
    onEdit: () => setModal({ mode: "editTask", task }),

        <div style={{ position: "fixed", top: "50%", left: "40%", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%)", filter: "blur(60px)", pointerEvents: "none", zIndex: 0 }} />

            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
              <ProgressRing progress={overall} size={52} />

            </div>

          <nav style={{ marginBottom: 44, overflowX: "auto" }}>

              {[["hoy", "Hoy"], ["semana", "Semana"], ["proyectos", "Proyectos"], ["historial", "Historial"], ["stats", "Stats"]].map(([v, label]) => (
                <button

                >

          {view === "hoy" && (

                  >

                </div>

                    <button
                      onClick={() => setModal({ mode: "editProject", project: activeProj })}
                      style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: TEXT_SUB, padding: "9px 18px", border: "1px solid rgba(0,0,0,0.1)", borderRadius: 50, fontFamily: F, textTransform: "uppercase", background: "transparent" }}
                    >
                      Editar
                    </button>
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 16, overflowX: "auto", paddingBottom: 12 }}>
                {STATUSES.map(status => {
                  const colTasks = projectTasks.filter(t => t.status === status);
                  const colColor = status === "doing" ? (activeProj?.color || ACCENT) : status === "done" ? "#5a9e7a" : "rgba(0,0,0,0.15)";
                  return (
                    <div key={status} style={{ minWidth: 260, flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, paddingBottom: 14, borderBottom: `2px solid ${colColor}` }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", color: status === "todo" ? TEXT_MUTED : colColor, fontFamily: F }}>
                            {STATUS_LABELS[status].toUpperCase()}
                          </span>
                          <span style={{ background: "rgba(0,0,0,0.06)", color: TEXT_MUTED, borderRadius: 50, padding: "2px 8px", fontSize: 10, fontFamily: F, fontWeight: 700 }}>
                            {colTasks.length}
                          </span>
                        </div>
                        <button
                          onClick={() => setModal({ mode: "addTask", defaultStatus: status, projectId: activeProject })}
                          style={{ color: TEXT_MUTED, fontSize: 20, lineHeight: 1, padding: "0 4px", fontWeight: 300 }}
                        >+</button>
                      </div>
                      {colTasks.length === 0 && (
                        <div style={{ background: CARD, backdropFilter: "blur(14px)", border: "1px dashed rgba(0,0,0,0.08)", borderRadius: 14, padding: "18px 12px", color: TEXT_MUTED, textAlign: "center", fontSize: 11, fontFamily: F }}>—</div>
                      )}
                      {colTasks.map(t => <TaskCard key={t.id} {...cp(t)} />)}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {view === "historial" && (
            <div>
              <div style={{ marginBottom: 28 }}>
                <h2 style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.18em", color: TEXT, fontFamily: F, textTransform: "uppercase" }}>HISTORIAL DE ACTIVIDAD</h2>
                <p style={{ fontSize: 11, color: TEXT_MUTED, marginTop: 4, fontFamily: F }}>Todo lo que has hecho, ordenado por día</p>
              </div>
              <HistoryView history={history} projects={projects} />
            </div>
          )}

          {view === "stats" && (
            <div>
              <div style={{ marginBottom: 28 }}>
                <h2 style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.18em", color: TEXT, fontFamily: F, textTransform: "uppercase" }}>ESTADÍSTICAS</h2>
                <p style={{ fontSize: 11, color: TEXT_MUTED, marginTop: 4, fontFamily: F }}>Cómo se está distribuyendo tu foco</p>
              </div>
              <StatsView history={history} tasks={tasks} projects={projects} />
            </div>
          )}

        </div>

        {modal && (
          <Modal
            modal={modal}
            projects={projects}
            onAddTask={addTask}
            onUpdateTask={updateTask}
            onDeleteTask={deleteTask}
            onAddProject={addProject}
            onUpdateProject={updateProject}
            onDeleteProject={deleteProject}
            onClose={() => setModal(null)}
          />
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
